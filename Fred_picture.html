<!DOCTYPE html>
<html>
<head>
    <title>My Image Gallery</title>
    <style>
        
        body {
            background-color: #3920c9; 
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin: 20px;
        }

        h1, h4 {
            text-align: center;
            color: #333;
        }

        .row1, .row2 {
            display: flex;
            justify-content: space-around; 
            margin-bottom: 50px;
            flex-wrap: wrap; 
        }

        .item {
            border: solid 2px black;
            background-color: white; 
            width: 250px;
            padding: 10px;
            text-align: center;
            border-radius: 10px; 
        }

        .item img {
            width: 100%; 
            height: auto;
            border-radius: 5px;
        }

        .item h1 {
            font-size: 18px;
            margin: 10px 0;
        }

        .item p {
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>My Image Gallery</h1>
    <h4>Throughout the years</h4>

    <div class="row1">
        <div class="item">
            <img src="cutee.jpg">
            <h1>Age: 2 or 3</h1>
            <p>cute me hehe</p>
        </div>
        <div class="item">
            <img src="fred.jpg.jpg">
            <h1>Age: 10 months old</h1>
            <p>guitar man :3</p>
        </div>
        <div class="item">
            <img src="mt first mvp in ammateur.jpg.jpg">
            <h1>Age: 16</h1>
            <p>first MVP in ammateur</p>
        </div>
    </div>

    <div class="row2">
        <div class="item">
            <img src="first ftf game.jpg.jpg">
            <h1>age: 16</h1>
            <p>first face to face tourna</p>
        </div>
        <div class="item">
            <img src="with miggy.jpg.jpg">
            <h1>Age: 14 </h1>
            <p>with miggy </picture></p>
        </div>
        <div class="item">
            <img src="wiht koya nad koya.jpg.jpg">
            <h1>Age: 15</h1>
            <p>with my cousins and kuyaa
            </p>
        </div>
    </div>

</body>
</html>
